<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>任务时间预估计算器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        
        .input-row {
            display: flex;
            gap: 10px;
        }
        
        input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .unit {
            display: flex;
            align-items: center;
            color: #666;
            font-size: 14px;
            min-width: 40px;
        }
        
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .result {
            margin-top: 30px;
            padding: 25px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 15px;
            display: none;
        }
        
        .result.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .result h2 {
            color: #333;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }
        
        .result-item:last-child {
            border-bottom: none;
        }
        
        .result-label {
            color: #555;
        }
        
        .result-value {
            font-weight: 600;
            color: #667eea;
        }
        
        .total {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px solid rgba(102, 126, 234, 0.3);
        }
        
        .total .result-value {
            font-size: 20px;
            color: #764ba2;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⏱️ 任务时间预估计算器</h1>
        
        <div class="form-group">
            <label>任务总数量</label>
            <input type="number" id="totalCount" placeholder="请输入任务数量" min="1">
        </div>
        
        <div class="form-group">
            <label>丢弃率 (%)</label>
            <div class="input-row">
                <input type="number" id="discardRate" placeholder="例如：10 表示10%" min="0" max="99">
                <span class="unit">%</span>
            </div>
        </div>
        
        <div class="form-group">
            <label>每条操作时间</label>
            <div class="input-row">
                <input type="number" id="operationMin" placeholder="分钟" min="0">
                <span class="unit">分</span>
                <input type="number" id="operationSec" placeholder="秒" min="0" max="59">
                <span class="unit">秒</span>
            </div>
        </div>
        
        <div class="form-group">
            <label>每条复位时间</label>
            <div class="input-row">
                <input type="number" id="resetMin" placeholder="分钟" min="0">
                <span class="unit">分</span>
                <input type="number" id="resetSec" placeholder="秒" min="0" max="59">
                <span class="unit">秒</span>
            </div>
        </div>
        
        <button onclick="calculate()">计算预估时间</button>
        
        <div class="result" id="result">
            <h2>📊 计算结果</h2>
            <div class="result-item" id="actualCountRow">
                <span class="result-label">实际需处理</span>
                <span class="result-value" id="actualCount">-</span>
            </div>
            <div class="result-item">
                <span class="result-label">操作总耗时</span>
                <span class="result-value" id="operationTotal">-</span>
            </div>
            <div class="result-item">
                <span class="result-label">复位总耗时</span>
                <span class="result-value" id="resetTotal">-</span>
            </div>
            <div class="result-item total">
                <span class="result-label">总预估时间</span>
                <span class="result-value" id="grandTotal">-</span>
            </div>
        </div>
    </div>
    
    <script>
        function calculate() {
            const totalCount = parseFloat(document.getElementById('totalCount').value) || 0;
            const discardRate = parseFloat(document.getElementById('discardRate').value) || 0;
            const operationMin = parseFloat(document.getElementById('operationMin').value) || 0;
            const operationSec = parseFloat(document.getElementById('operationSec').value) || 0;
            const resetMin = parseFloat(document.getElementById('resetMin').value) || 0;
            const resetSec = parseFloat(document.getElementById('resetSec').value) || 0;
            
            if (totalCount <= 0) {
                alert('请输入有效的任务数量！');
                return;
            }
            
            // 计算实际需要处理的任务数量（向上取整）
            let actualCount = totalCount;
            const actualCountRow = document.getElementById('actualCountRow');
            
            if (discardRate > 0) {
                actualCount = Math.ceil(totalCount / (1 - discardRate / 100));
                actualCountRow.style.display = 'flex';
                document.getElementById('actualCount').textContent = actualCount + ' 条';
            } else {
                actualCountRow.style.display = 'none';
            }
            
            const operationTotalSec = (operationMin * 60 + operationSec) * actualCount;
            const resetTotalSec = (resetMin * 60 + resetSec) * actualCount;
            const grandTotalSec = operationTotalSec + resetTotalSec;
            
            document.getElementById('operationTotal').textContent = formatTime(operationTotalSec);
            document.getElementById('resetTotal').textContent = formatTime(resetTotalSec);
            document.getElementById('grandTotal').textContent = formatTime(grandTotalSec);
            
            document.getElementById('result').classList.add('show');
        }
        
        function formatTime(totalSeconds) {
            const hours = Math.floor(totalSeconds / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;
            
            let result = '';
            if (hours > 0) {
                result += `${hours}小时 `;
            }
            if (minutes > 0) {
                result += `${minutes}分钟 `;
            }
            if (seconds > 0 || result === '') {
                result += `${seconds}秒`;
            }
            
            return result.trim();
        }
    </script>
</body>
</html>
